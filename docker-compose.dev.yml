services:
  postgres:
    image: postgres:16-alpine
    container_name: openhorizon-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openhorizon
    volumes:
      - openhorizon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openhorizon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  openhorizon_postgres_data:
