version: 2

project_name: ohctl

before:
  hooks:
    - go mod tidy

builds:
  - id: ohctl
    binary: ohctl
    main: ./cmd/ohctl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/openhorizon/ohforge/internal/cli.Version={{.Version}} -X github.com/openhorizon/ohforge/internal/cli.Commit={{.Commit}} -X github.com/openhorizon/ohforge/internal/cli.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ohctl-archive
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: checksums.txt

sboms:
  - id: archives
    artifacts: archive

signs:
  - id: checksum-signature
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--yes"
      - "--armor"
      - "--pinentry-mode"
      - "loopback"
      - "--passphrase"
      - "{{ .Env.GPG_PASSPHRASE }}"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
    disable: "{{ if or (eq .Env.GPG_FINGERPRINT \"\") (eq .Env.GPG_PASSPHRASE \"\") }}true{{ else }}false{{ end }}"

release:
  prerelease: auto
  github:
    owner: openhorizon
    name: openhorizon-forge
