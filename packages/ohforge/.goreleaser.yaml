version: 2

project_name: ohctl

before:
  hooks:
    - go mod tidy

builds:
  - id: ohctl
    binary: ohctl
    main: ./cmd/ohctl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/openhorizon/ohforge/internal/cli.Version={{.Version}} -X github.com/openhorizon/ohforge/internal/cli.Commit={{.Commit}} -X github.com/openhorizon/ohforge/internal/cli.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ohctl-archive
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: openhorizon
    name: openhorizon-forge
