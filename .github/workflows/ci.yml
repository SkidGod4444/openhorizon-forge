name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run check-types

      - name: Lint
        run: bun run lint

  cli-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/ohforge/go.mod

      - name: Build ohctl
        run: go build ./cmd/ohctl
        working-directory: packages/ohforge

      - name: ohctl version
        run: go run ./cmd/ohctl version
        working-directory: packages/ohforge
