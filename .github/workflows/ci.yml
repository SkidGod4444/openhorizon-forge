name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run check-types

      - name: Lint
        run: bun run lint

  api-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: openhorizon
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d openhorizon"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Start control API
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/openhorizon
          DATABASE_MAX_CONNECTIONS: "10"
          PORT: "8080"
          SLURM_MOCK_MODE: "true"
          CONTROL_API_KEY: "ci-test-key"
        run: |
          bun --cwd apps/control run dev > /tmp/control.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:8080/healthz > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8080/healthz

      - name: Smoke test core endpoints
        env:
          BASE_URL: http://localhost:8080
        run: |
          status_code="$(curl -s -o /dev/null -w '%{http_code}' "$BASE_URL/v1/jobs?limit=1")"
          test "$status_code" = "401"
          curl -sf -H "Authorization: Bearer ci-test-key" "$BASE_URL/v1/jobs?limit=1"

  cli-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/ohforge/go.mod

      - name: Build ohctl
        run: go build ./cmd/ohctl
        working-directory: packages/ohforge

      - name: ohctl version
        run: go run ./cmd/ohctl version
        working-directory: packages/ohforge
